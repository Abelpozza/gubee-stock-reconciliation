version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gubee-postgres
    environment:
      POSTGRES_DB: stockreconciliation
      POSTGRES_USER: gubee
      POSTGRES_PASSWORD: gubee123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: gubee-app
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stockreconciliation
      SPRING_DATASOURCE_USERNAME: gubee
      SPRING_DATASOURCE_PASSWORD: gubee123
    ports:
      - "8080:8080"

volumes:
  postgres_data: